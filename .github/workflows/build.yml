name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install openai

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name litellm-test test_litellm_connection.py

    - name: Prepare artifacts
      shell: bash
      run: |
        mkdir -p artifacts

        # Copy executable
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          cp dist/litellm-test.exe artifacts/
        else
          cp dist/litellm-test artifacts/
        fi

        # Copy source code
        cp test_litellm_connection.py artifacts/

        # Create README
        cat > artifacts/README.txt << 'EOF'
        LiteLLM Connection Test Tool
        ===========================

        This tool tests the connection to LiteLLM service.

        Usage:
        - Windows: litellm-test.exe
        - macOS: ./litellm-test

        The test will:
        1. Connect to LiteLLM service
        2. Send a test request
        3. Display the AI response
        4. Show usage statistics

        Configuration:
        - API URL: http://litellm-route-ai-tools.apps.dcloud.bocmacau.com/vl
        - Model: Qwen3.6-35B-A3B
        - API Key: Configured in the script
        EOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: litellm-test-${{ matrix.os }}
        path: artifacts/
        retention-days: 30

    - name: Display build info
      shell: bash
      run: |
        echo "Build completed for ${{ matrix.os }}"
        ls -lh artifacts/
